<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_TERMINAL_V17.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508; --surface: #0a0f16; --border: #1a2633;
            --accent: #00e5ff; --accent-dim: rgba(0, 229, 255, 0.1);
            --text: #e8edf5; --muted: #5a6478; --danger: #ff4b4b;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        
        .lucide { width: 16px; height: 16px; vertical-align: -3px; stroke-width: 2px; }

        body { background: var(--bg); color: var(--text); font-family: var(--display); margin: 0; padding: 20px; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        
        body::before { 
            content: ''; position: fixed; inset: 0; 
            background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); 
            background-size: 60px 60px; pointer-events: none; opacity: 0.12; 
        }

        header { border-left: 4px solid var(--accent); padding-left: 20px; margin: 60px 0; }
        h1 { font-size: clamp(40px, 8vw, 72px); margin: 0; letter-spacing: -3px; text-transform: uppercase; line-height: 0.9; }
        .tagline { font-family: var(--mono); color: var(--accent); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }

        .nav-zone { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 25px; }
        .filter-list { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
        .sub-nav { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 20px; background: rgba(255,255,255,0.02); border-left: 2px solid var(--accent); margin-top: 10px; display: none; }
        
        .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 18px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 15px var(--accent-dim); }
        
        .sub-btn { font-family: var(--mono); font-size: 9px; color: var(--muted); background: none; border: none; cursor: pointer; text-transform: uppercase; padding: 4px 8px; }
        .sub-btn.active { color: var(--bg); background: var(--accent); font-weight: bold; }

        .admin-bar { background: var(--surface); border: 1px solid var(--accent); padding: 25px; margin-bottom: 40px; display: none; box-shadow: 0 0 20px var(--accent-dim); }
        input, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: var(--mono); font-size: 13px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-family: var(--mono); text-transform: uppercase; font-size: 10px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; }
        .btn:hover { background: var(--accent-dim); box-shadow: 0 0 15px var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        /* The Blue-Shift Filter Logic */
        .card-img { 
            width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #000; margin-bottom: 20px; border: 1px solid var(--border);
            filter: grayscale(100%) contrast(1.1); transition: 0.5s ease;
        }
        .card:hover .card-img { 
            filter: grayscale(100%) brightness(0.8) sepia(100%) hue-rotate(150deg) saturate(500%); 
        }

        .card-title { font-size: 26px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; }

        #detail-modal { position: fixed; inset: 0; background: rgba(3,5,8,0.98); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); max-width: 800px; width: 100%; padding: 40px; position: relative; }
        .modal-gallery img { width: 100%; max-height: 450px; object-fit: contain; border: 1px solid var(--border); background: #000; margin-bottom: 15px; }
        
        .admin-actions { display: none; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .edit-mode .admin-actions { display: flex; }
        .login-trigger { position: fixed; bottom: 20px; right: 20px; opacity: 0.05; cursor: pointer; font-size: 10px; }
    </style></head><body>

<div id="detail-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="tagline" id="modal-cat"></div>
        <h2 id="modal-title" style="margin: 10px 0; text-transform: uppercase;"></h2>
        <div class="modal-gallery" id="modal-gallery"></div>
        <div id="modal-body" style="font-family: var(--mono); color: #a1aab8; white-space: pre-wrap; font-size: 14px; line-height: 1.8;"></div>
        <div id="modal-links" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:25px; border-top:1px solid var(--border); padding-top:20px;"></div>
        <button class="btn" style="margin-top:40px; border-color:var(--muted); color:var(--muted)" onclick="closeModal()">Close_Terminal</button>
    </div>
</div>

<div class="container">
    <header>
        <div class="tagline">ARCHIVE_SYSTEM_v17.3 // UI_REFINE</div>
        <h1>John Hall</h1>
        <p style="font-family: var(--mono); color: var(--muted);">SR_ANALYST // AI_ML_ARCHITECTURE</p>
    </header>

    <div class="nav-zone">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div class="filter-list" id="filter-bar"></div>
            <button class="btn" onclick="unlockAdmin()" style="opacity:0.2; border-color:var(--muted); color:var(--muted)">Admin</button>
        </div>
        <div class="sub-nav" id="sub-filter-bar"></div>
    </div>

    <div id="admin-panel" class="admin-bar">
        <div style="margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:20px;">
            <div class="tagline" style="margin-bottom:10px;">Structure</div>
            <div id="cat-chips" style="margin-bottom:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-cat" placeholder="PARENT:CHILD" style="margin:0;">
                <button class="btn" onclick="addStructure()">Add</button>
            </div>
        </div>
        <div>
            <div class="tagline" style="margin-bottom:10px;">Project_Entry</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <input type="text" id="p-title" placeholder="NAME">
                <input type="text" id="p-category" placeholder="CAT:SUB">
            </div>
            <input type="text" id="p-img" placeholder="IMAGE_URLS">
            <input type="text" id="p-links" placeholder="LABEL:URL, LABEL:URL">
            <textarea id="p-desc" rows="2" placeholder="SUMMARY"></textarea>
            <textarea id="p-detail" rows="4" placeholder="FULL_LOG"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="saveProject()" id="save-btn">Sync</button>
                <button class="btn" onclick="exportFinalHTML()">Export</button>
                <button class="btn" onclick="lockAdmin()" style="margin-left:auto;">Lock</button>
            </div>
        </div>
    </div>

    <div class="grid" id="project-grid"></div>
</div>

<div class="login-trigger" onclick="unlockAdmin()">[REDACTED_ACCESS]</div>

<script>
    let projects = [
        {"id":1,"title":"ELEVATED CANDLES","category":"CAREER:OPERATIONS","desc":"Founder & Data Lead. Developed forecasting models and KPI dashboards.","detail":"<b>Technical Breakdown:</b>\nSQL Server optimization\nTableau Dashboard design\n40% growth in efficiency.","img":"fall fantasy.png","links":"Instagram: https://www.instagram.com/elevatedcandles/, YouTube: https://www.youtube.com/@Elevatedcandles/videos"},
        {"id":2,"title":"THE Y FILES","category":"CREATIVE:VIDEO","desc":"A documentary exploration of data and storytelling.","detail":"","img":"y_files - logo.png","links":"EP1: https://www.facebook.com/share/v/1CMZ5irfWt/, EP2: https://www.facebook.com/share/v/1DrBcmPFzN/, EP3: https://www.facebook.com/share/v/1KMs9my3ps/"}
    ];
    let structure = ["CAREER:ANALYTICS", "CAREER:CODE", "CREATIVE:VIDEO", "RESEARCH"];
    
    let currentParent = 'ALL'; let currentChild = 'ALL'; let editingId = null;

    function render() {
        const parents = ['ALL', ...new Set([...structure.map(s => s.split(':')[0]), ...projects.map(p => p.category.split(':')[0])])].filter(Boolean);
        document.getElementById('filter-bar').innerHTML = parents.map(p => `<button class="filter-btn ${currentParent === p ? 'active' : ''}" onclick="setParent('${p}')">${p}</button>`).join('');

        const subNav = document.getElementById('sub-filter-bar');
        if (currentParent !== 'ALL') {
            const children = ['ALL', ...new Set([...structure.filter(s => s.startsWith(currentParent + ':')).map(s => s.split(':')[1]), ...projects.filter(p => p.category.startsWith(currentParent + ':')).map(p => p.category.split(':')[1])].filter(Boolean))];
            if (children.length > 1) {
                subNav.style.display = 'flex';
                subNav.innerHTML = children.map(c => `<button class="sub-btn ${currentChild === c ? 'active' : ''}" onclick="setChild('${c}')">[ ${c} ]</button>`).join('');
            } else { subNav.style.display = 'none'; }
        } else { subNav.style.display = 'none'; }

        document.getElementById('cat-chips').innerHTML = structure.map(s => `<span style="background:#000; border:1px solid var(--border); padding:4px 8px; font-size:10px; font-family:var(--mono);">${s} <button onclick="removeStructure('${s}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">×</button></span>`).join('');

        const filtered = projects.filter(p => {
            const [pCat, pSub] = p.category.split(':');
            return (currentParent === 'ALL' || pCat === currentParent) && (currentChild === 'ALL' || (pSub || '') === currentChild);
        });

        document.getElementById('project-grid').innerHTML = filtered.map(p => `
            <div class="card">
                ${p.img ? `<img src="${p.img.split(',')[0]}" class="card-img">` : ''}
                <div class="tagline" style="font-size:10px; color:var(--accent); margin-bottom:5px;">// ${p.category.replace(':', ' > ')}</div>
                <div class="card-title">${p.title}</div>
                <p style="font-family:var(--mono); color:var(--muted); font-size:12px; flex-grow:1;">${p.desc}</p>
                <button class="btn" style="margin-top:15px;" onclick="openModal(${p.id})">Open_Log <i data-lucide="chevron-right"></i></button>
                <div class="admin-actions">
                    <button class="btn" onclick="startEdit(${p.id})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteProject(${p.id})">Del</button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function setParent(p) { currentParent = p; currentChild = 'ALL'; render(); }
    function setChild(c) { currentChild = c; render(); }
    function unlockAdmin() { if(prompt("PASSCODE:") === "1234") { document.getElementById('admin-panel').style.display='block'; document.body.classList.add('edit-mode'); } }
    function lockAdmin() { document.getElementById('admin-panel').style.display='none'; document.body.classList.remove('edit-mode'); }

    function openModal(id) {
        const p = projects.find(x => x.id === id);
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-cat').innerText = `NODE // ${p.category}`;
        document.getElementById('modal-body').innerHTML = p.detail || p.desc;
        document.getElementById('modal-gallery').innerHTML = p.img ? p.img.split(',').map(src => `<img src="${src.trim()}">`).join('') : '';
        document.getElementById('modal-links').innerHTML = p.links ? p.links.split(',').map(l => {
            const parts = l.split(':'); const label = parts.shift().trim(); const url = parts.join(':').trim();
            return `<a href="${url}" target="_blank" class="btn">${label}</a>`;
        }).join('') : '';
        document.getElementById('detail-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        lucide.createIcons();
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

    function saveProject() {
        const p = { id: editingId || Date.now(), title: document.getElementById('p-title').value, category: document.getElementById('p-category').value.toUpperCase().trim(), desc: document.getElementById('p-desc').value, detail: document.getElementById('p-detail').value, img: document.getElementById('p-img').value, links: document.getElementById('p-links').value };
        if(editingId) projects = projects.map(x => x.id === editingId ? p : x); else projects.push(p);
        editingId = null; cancelEdit(); render();
    }

    function startEdit(id) {
        editingId = id; const p = projects.find(x => x.id === id);
        document.getElementById('p-title').value = p.title; document.getElementById('p-category').value = p.category;
        document.getElementById('p-desc').value = p.desc; document.getElementById('p-detail').value = p.detail || '';
        document.getElementById('p-img').value = p.img || ''; document.getElementById('p-links').value = p.links || '';
        document.getElementById('save-btn').innerText = "Update"; window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit() { editingId = null; document.getElementById('save-btn').innerText = "Sync"; ['p-title','p-category','p-desc','p-detail','p-img','p-links'].forEach(id => document.getElementById(id).value = ''); }
    function deleteProject(id) { if(confirm("Wipe?")) { projects = projects.filter(p => p.id !== id); render(); } }
    function addStructure() { const val = document.getElementById('new-cat').value.toUpperCase().trim(); if(val && !structure.includes(val)) { structure.push(val); render(); } }
    function removeStructure(s) { structure = structure.filter(i => i !== s); render(); }

    function exportFinalHTML() {
        const dataStr = `let projects = ${JSON.stringify(projects)};\n    let structure = ${JSON.stringify(structure)};`;
        let html = document.documentElement.outerHTML.replace(/let projects = \[.*?\];\s*let structure = \[.*?\];/s, dataStr);
        html = html.replace('display: block;', 'display: none;').replace('class="edit-mode"', '');
        const blob = new Blob(["<!DOCTYPE html>\n" + html], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }
    render();
</script></body></html>
