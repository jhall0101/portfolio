<!DOCTYPE html>
<html lang="en"><plasmo-csui id="jobright-helper-plugin"></plasmo-csui><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_TERMINAL_V4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Mono:wght@300;400&amp;display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508; --surface: #0a0f16; --border: #1a2633;
            --accent: #00e5ff; --accent-dim: rgba(0, 229, 255, 0.15);
            --text: #e8edf5; --muted: #5a6478; --danger: #ff4b4b;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--display); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; z-index: 1; position: relative; }
        
        /* Sci-Fi Grid Overlay */
        body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; opacity: 0.2; }

        header { border-left: 4px solid var(--accent); padding-left: 20px; margin: 40px 0; }
        h1 { font-size: clamp(32px, 8vw, 64px); margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .tagline { font-family: var(--mono); color: var(--accent); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

        /* Navigation & Filters */
        .nav-zone { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .filter-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        /* Admin Box (The Glow) */
        .admin-bar { background: var(--surface); border: 1px solid var(--accent); padding: 25px; margin-bottom: 40px; display: none; box-shadow: 0 0 25px var(--accent-dim); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: var(--mono); font-size: 13px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px var(--accent-dim); }
        
        .btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-family: var(--mono); text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }

        /* Project Cards (Now with Glow) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); box-shadow: 0 0 25px var(--accent-dim); transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; background: #000; margin-bottom: 20px; object-fit: cover; border: 1px solid var(--border); }
        .card-tag { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-bottom: 10px; letter-spacing: 1px; }
        .card-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--text); }
        .card-desc { font-family: var(--mono); font-size: 13px; color: #a1aab8; line-height: 1.6; flex-grow: 1; margin-bottom: 20px; }
        
        .admin-actions { display: none; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .edit-mode .admin-actions { display: flex; }

        .login-trigger { position: fixed; bottom: 20px; left: 20px; opacity: 0.1; cursor: pointer; font-family: var(--mono); font-size: 9px; }
    </style>
<style type="text/css" id="operaUserStyle"></style><style type="text/css"></style></head>
<body data-new-gr-c-s-check-loaded="14.1280.0" data-gr-ext-installed="" class="edit-mode">

<div class="container">
    <header>
        <div class="tagline">VERSION_4.0 // ACTIVE_DATA_STREAM</div>
        <h1>John Hall</h1>
        <p style="font-family: var(--mono); color: var(--muted);">SR_ANALYST // AI_ML_SPECIALIST</p>
    </header>

    <div class="nav-zone">
        <div class="filter-list" id="filter-bar">
            <button class="filter-btn active" onclick="setFilter('ALL')">ALL</button>
        
            <button class="filter-btn " onclick="setFilter('CAREER')">CAREER</button>
        </div>
        <button class="btn" onclick="unlockAdmin()" id="lock-btn" style="display: none;">Admin_Access</button>
    </div>

    <div id="admin-panel" class="admin-bar" style="display: block;">
        <div class="input-group">
            <input type="text" id="p-title" placeholder="ENTRY_NAME">
            <input type="text" id="p-category" placeholder="DOMAIN (e.g. VISUALS, CODE)">
        </div>
        <div class="input-group">
            <input type="text" id="p-img" placeholder="IMG_PATH (e.g. chart.png)">
            <input type="text" id="p-link" placeholder="EXTERNAL_URL">
        </div>
        <textarea id="p-desc" rows="3" placeholder="CORE_LOG_DATA (Icons: &lt;i data-lucide='cpu'&gt;&lt;/i&gt;)"></textarea>
        
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="saveProject()" id="main-save-btn">Sync_To_Mainframe</button>
            <button class="btn" onclick="exportFinalHTML()">Download_v4_Index.html</button>
            <button class="btn btn-danger" onclick="cancelEdit()" id="cancel-btn" style="display: none;">Abort</button>
        </div>
    </div>

    <div class="grid" id="project-grid">
            <div class="card">
                <img src="fall fantasy.png" class="card-img">
                <div class="card-tag">// CAREER</div>
                <div class="card-title">Elevated Candles <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="flame" aria-hidden="true" class="lucide lucide-flame"><path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"></path></svg></div>
                <div class="card-desc">Founder &amp; Data Lead. Developed forecasting models and KPI dashboards.</div>
                <a href="https://www.instagram.com/elevatedcandles/" target="_blank" class="btn" style="text-decoration:none; text-align:center;">Launch_Module</a>
                
                <div class="admin-actions">
                    <button class="btn" onclick="startEdit(1)">Edit</button>
                    <button class="btn btn-danger" onclick="deleteProject(1)">Delete</button>
                </div>
            </div>
        </div>
</div>

<div class="login-trigger" onclick="unlockAdmin()">[REDACTED_ACCESS]</div>

<script>
    // DATA CORE - Update this as you add projects
    let projects = [{"id":1,"title":"Elevated Candles <i data-lucide=\"flame\"></i>","category":"CAREER","desc":"Founder & Data Lead. Developed forecasting models and KPI dashboards.","img":"fall fantasy.png","link":"https://www.instagram.com/elevatedcandles/"}];
    
    let editingId = null;
    let currentFilter = 'ALL';

    function render() {
        // 1. Render Filters
        const uniqueCategories = ['ALL', ...new Set(projects.map(p => p.category.toUpperCase()))];
        const filterBar = document.getElementById('filter-bar');
        filterBar.innerHTML = uniqueCategories.map(cat => `
            <button class="filter-btn ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</button>
        `).join('');

        // 2. Render Projects
        const grid = document.getElementById('project-grid');
        const filtered = currentFilter === 'ALL' ? projects : projects.filter(p => p.category.toUpperCase() === currentFilter);
        
        grid.innerHTML = filtered.map(p => `
            <div class="card">
                ${p.img ? `<img src="${p.img}" class="card-img">` : '<div class="card-img" style="display:flex; align-items:center; justify-content:center; opacity:0.2"><i data-lucide="box" size="48"></i></div>'}
                <div class="card-tag">// ${p.category}</div>
                <div class="card-title">${p.title}</div>
                <div class="card-desc">${p.desc}</div>
                ${p.link !== "#" ? `<a href="${p.link}" target="_blank" class="btn" style="text-decoration:none; text-align:center;">Launch_Module</a>` : ''}
                
                <div class="admin-actions">
                    <button class="btn" onclick="startEdit(${p.id})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete</button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function setFilter(cat) {
        currentFilter = cat;
        render();
    }

    function unlockAdmin() {
        if(prompt("INPUT_PASSCODE:") === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
            document.body.classList.add('edit-mode');
            document.getElementById('lock-btn').style.display = 'none';
        }
    }

    function saveProject() {
        const p = {
            id: editingId || Date.now(),
            title: document.getElementById('p-title').value,
            category: document.getElementById('p-category').value || 'GENERAL',
            desc: document.getElementById('p-desc').value,
            img: document.getElementById('p-img').value,
            link: document.getElementById('p-link').value
        };

        if(editingId) {
            projects = projects.map(old => old.id === editingId ? p : old);
        } else {
            projects.push(p);
        }
        
        cancelEdit();
        render();
    }

    function startEdit(id) {
        editingId = id;
        const p = projects.find(x => x.id === id);
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-category').value = p.category;
        document.getElementById('p-desc').value = p.desc;
        document.getElementById('p-img').value = p.img;
        document.getElementById('p-link').value = p.link;
        document.getElementById('main-save-btn').innerText = "Update_Entry";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit() {
        editingId = null;
        ['p-title','p-category','p-desc','p-img','p-link'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('main-save-btn').innerText = "Sync_To_Mainframe";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteProject(id) {
        if(confirm("DESTRUCT_ENTRY?")) {
            projects = projects.filter(p => p.id !== id);
            render();
        }
    }

    function exportFinalHTML() {
        const dataString = `let projects = ${JSON.stringify(projects)};`;
        const html = document.documentElement.outerHTML.replace(/let projects = \[.*?\];/s, dataString);
        const blob = new Blob(["<!DOCTYPE html>\n" + html], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }

    render();
</script>


</body><grammarly-desktop-integration data-grammarly-shadow-root="true"></grammarly-desktop-integration></html>
