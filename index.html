<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_TERMINAL_V8.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508; --surface: #0a0f16; --border: #1a2633;
            --accent: #00e5ff; --accent-dim: rgba(0, 229, 255, 0.1);
            --text: #e8edf5; --muted: #5a6478; --danger: #ff4b4b;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--display); margin: 0; padding: 20px; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        
        body::before { content: ''; position: fixed; inset: 0; background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; opacity: 0.15; }

        header { border-left: 4px solid var(--accent); padding-left: 20px; margin: 60px 0; }
        h1 { font-size: clamp(40px, 8vw, 72px); margin: 0; letter-spacing: -3px; text-transform: uppercase; }
        .tagline { font-family: var(--mono); color: var(--accent); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }

        /* Navigation & Category Glow Restored */
        .nav-zone { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 25px; gap: 20px; }
        .filter-list { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 18px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; }
        
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent-dim); }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 20px var(--accent), inset 0 0 10px var(--accent-dim); text-shadow: 0 0 8px var(--accent); }

        .admin-bar { background: var(--surface); border: 1px solid var(--accent); padding: 25px; margin-bottom: 40px; display: none; box-shadow: 0 0 20px var(--accent-dim); }
        input, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: var(--mono); font-size: 13px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-family: var(--mono); text-transform: uppercase; font-size: 10px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn:hover { background: var(--accent-dim); box-shadow: 0 0 15px var(--accent); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-dim); transform: translateY(-5px); }

        .card-img { 
            width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #000; margin-bottom: 20px; 
            filter: grayscale(100%) brightness(0.8) sepia(100%) hue-rotate(150deg) saturate(500%);
            transition: 0.4s ease; border: 1px solid var(--border);
        }
        .card:hover .card-img { filter: none; }
        .card-title { font-size: 26px; font-weight: 800; margin-bottom: 12px; }

        /* Modal Layout Improvements */
        #detail-modal { position: fixed; inset: 0; background: rgba(3,5,8,0.98); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); max-width: 900px; width: 100%; padding: 40px; position: relative; box-shadow: 0 0 50px rgba(0,229,255,0.1); }
        
        .modal-gallery { display: flex; flex-direction: column; gap: 20px; margin: 25px 0; }
        .modal-gallery img { width: 100%; max-height: 500px; object-fit: contain; border: 1px solid var(--border); background: #000; }
        
        .modal-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 25px; }
        
        .admin-actions { display: none; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .edit-mode .admin-actions { display: flex; }
        .login-trigger { position: fixed; bottom: 20px; right: 20px; opacity: 0.05; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div id="detail-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="tagline" id="modal-cat"></div>
        <h2 id="modal-title" style="font-size: clamp(24px, 5vw, 42px); margin: 10px 0; text-transform: uppercase;"></h2>
        <div class="modal-gallery" id="modal-gallery"></div>
        <div id="modal-body" style="font-family: var(--mono); color: #a1aab8; white-space: pre-wrap; font-size: 14px; line-height: 1.8;"></div>
        <div class="modal-links" id="modal-links"></div>
        <button class="btn" style="margin-top:40px; border-color:var(--muted); color:var(--muted)" onclick="closeModal()">Close_Terminal</button>
    </div>
</div>

<div class="container">
    <header>
        <div class="tagline">ARCHIVE_SYSTEM_v8.2 // JH0101</div>
        <h1>John Hall</h1>
        <p style="font-family: var(--mono); color: var(--muted);">SR_ANALYST // AI_ML_ARCHITECTURE</p>
    </header>

    <div class="nav-zone">
        <div class="filter-list" id="filter-bar"></div>
        <button class="btn" onclick="unlockAdmin()" id="lock-btn" style="opacity:0.3; border-color:var(--muted); color:var(--muted)">Admin_Access</button>
    </div>

    <div id="admin-panel" class="admin-bar">
        <div class="input-group" style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <input type="text" id="p-title" placeholder="PROJECT_NAME">
            <input type="text" id="p-category" placeholder="DOMAIN (e.g. VISUALS)">
        </div>
        <input type="text" id="p-img" placeholder="IMAGES (comma separated URLs or filenames)">
        <input type="text" id="p-links" placeholder="LINKS (Label: URL, Label: URL)">
        <textarea id="p-desc" rows="2" placeholder="SHORT_CARD_SUMMARY"></textarea>
        <textarea id="p-detail" rows="6" placeholder="FULL_LOG_DETAIL (Supports HTML)"></textarea>
        
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="saveProject()" id="main-save-btn">Sync_To_Mainframe</button>
            <button class="btn" onclick="exportFinalHTML()">Download HTML</button>
            <button class="btn btn-danger" onclick="cancelEdit()" id="cancel-btn" style="display:none">Abort</button>
        </div>
    </div>

    <div class="grid" id="project-grid"></div>
</div>

<div class="login-trigger" onclick="unlockAdmin()">[ENCRYPTED_LINK]</div>

<script>
    let projects = [
        { id: 1, title: "<i data-lucide='flame'></i> Elevated Candles", category: "CAREER", desc: "Founder & Data Lead. Developed forecasting models and KPI dashboards.", detail: "<b>Technical Breakdown:</b>\n<i data-lucide='cpu'></i> SQL Server optimization\n<i data-lucide='bar-chart-3'></i> Tableau Dashboard design\n<i data-lucide='trending-up'></i> 40% growth in efficiency.", img: "", links: "Visit Store: https://example.com" }
    ];
    
    let editingId = null;
    let currentFilter = 'ALL';

    function render() {
        const uniqueCategories = ['ALL', ...new Set(projects.map(p => p.category.toUpperCase()))];
        const filterBar = document.getElementById('filter-bar');
        filterBar.innerHTML = uniqueCategories.map(cat => `
            <button class="filter-btn ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</button>
        `).join('');

        const grid = document.getElementById('project-grid');
        const filtered = currentFilter === 'ALL' ? projects : projects.filter(p => p.category.toUpperCase() === currentFilter);
        
        grid.innerHTML = filtered.map(p => {
            const firstImg = p.img ? p.img.split(',')[0].trim() : '';
            return `
            <div class="card">
                ${firstImg ? `<img src="${firstImg}" class="card-img">` : '<div class="card-img" style="display:flex; align-items:center; justify-content:center; opacity:0.1"><i data-lucide="database" size="48"></i></div>'}
                <div class="card-tag">// ${p.category}</div>
                <div class="card-title">${p.title}</div>
                <div class="card-desc">${p.desc}</div>
                <button class="btn" onclick="openModal(${p.id})">Open_Log <i data-lucide="chevron-right" size="14"></i></button>
                <div class="admin-actions">
                    <button class="btn" onclick="startEdit(${p.id})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete</button>
                </div>
            </div>
        `}).join('');
        lucide.createIcons();
    }

    function openModal(id) {
        const p = projects.find(x => x.id === id);
        
        // Final Fix: Inject innerHTML then trigger icons
        document.getElementById('modal-title').innerHTML = p.title;
        document.getElementById('modal-cat').innerText = `DATA_ENTRY // ${p.category}`;
        document.getElementById('modal-body').innerHTML = p.detail || p.desc;
        
        const gallery = document.getElementById('modal-gallery');
        gallery.innerHTML = p.img ? p.img.split(',').map(src => `<img src="${src.trim()}">`).join('') : '';
        
        const linksContainer = document.getElementById('modal-links');
        if (p.links) {
            linksContainer.innerHTML = p.links.split(',').map(l => {
                const parts = l.split(':');
                const label = parts.shift().trim();
                const url = parts.join(':').trim();
                return `<a href="${url}" target="_blank" class="btn">${label}</a>`;
            }).join('');
        } else { linksContainer.innerHTML = ''; }

        document.getElementById('detail-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Stop background scroll
        lucide.createIcons();
    }

    function closeModal() { 
        document.getElementById('detail-modal').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    function setFilter(cat) { currentFilter = cat; render(); }

    function unlockAdmin() {
        if(prompt("PASSCODE:") === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
            document.body.classList.add('edit-mode');
        }
    }

    function saveProject() {
        const p = {
            id: editingId || Date.now(),
            title: document.getElementById('p-title').value,
            category: document.getElementById('p-category').value || 'GENERAL',
            desc: document.getElementById('p-desc').value,
            detail: document.getElementById('p-detail').value,
            img: document.getElementById('p-img').value,
            links: document.getElementById('p-links').value
        };
        if(editingId) projects = projects.map(old => old.id === editingId ? p : old);
        else projects.push(p);
        cancelEdit(); render();
    }

    function startEdit(id) {
        editingId = id; const p = projects.find(x => x.id === id);
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-category').value = p.category;
        document.getElementById('p-desc').value = p.desc;
        document.getElementById('p-detail').value = p.detail || '';
        document.getElementById('p-img').value = p.img || '';
        document.getElementById('p-links').value = p.links || '';
        document.getElementById('main-save-btn').innerText = "Update_Entry";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit() {
        editingId = null;
        ['p-title','p-category','p-desc','p-detail','p-img','p-links'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('main-save-btn').innerText = "Sync_To_Mainframe";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteProject(id) {
        if(confirm("DELETE_ENTRY?")) { projects = projects.filter(p => p.id !== id); render(); }
    }

    function exportFinalHTML() {
        const dataString = `let projects = ${JSON.stringify(projects)};`;
        let html = document.documentElement.outerHTML;
        html = html.replace(/let projects = \[.*?\];/s, dataString);
        html = html.replace('display: block;', 'display: none;'); 
        html = html.replace('class="edit-mode"', '');
        const blob = new Blob(["<!DOCTYPE html>\n" + html], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }
    render();
</script>
</body>
</html>
