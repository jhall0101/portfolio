<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_TERMINAL_V17.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508; --surface: #0a0f16; --border: #1a2633;
            --accent: #00e5ff; --accent-dim: rgba(0, 229, 255, 0.1);
            --text: #e8edf5; --muted: #5a6478; --danger: #ff4b4b;
            --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
        }
        
        .lucide { width: 18px; height: 18px; vertical-align: -4px; stroke-width: 2px; }
        body { background: var(--bg); color: var(--text); font-family: var(--display); margin: 0; padding: 20px; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        
        /* Fixed Mobile Grid Visibility */
        body::before { 
            content: ''; position: fixed; inset: 0; 
            background: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); 
            background-size: clamp(30px, 10vw, 60px) clamp(30px, 10vw, 60px); 
            pointer-events: none; opacity: 0.15; z-index: 0;
        }

        header { border-left: 4px solid var(--accent); padding-left: 20px; margin: 40px 0; position: relative; z-index: 2; }
        h1 { font-size: clamp(40px, 8vw, 72px); margin: 0; letter-spacing: -3px; text-transform: uppercase; }
        .tagline { font-family: var(--mono); color: var(--accent); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }

        .nav-zone { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 25px; position: relative; z-index: 2; }
        .filter-list { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
        .sub-nav { display: flex; gap: 10px; flex-wrap: wrap; padding: 10px 20px; background: rgba(0,229,255,0.03); border-left: 2px solid var(--accent); margin-top: 10px; display: none; }
        
        .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 15px var(--accent-dim); }
        
        .sub-btn { font-family: var(--mono); font-size: 9px; color: var(--muted); background: none; border: none; cursor: pointer; text-transform: uppercase; padding: 4px 8px; }
        .sub-btn.active { color: var(--bg); background: var(--accent); font-weight: bold; }

        .admin-bar { background: var(--surface); border: 1px solid var(--accent); padding: 25px; margin-bottom: 40px; display: none; box-shadow: 0 0 20px var(--accent-dim); position: relative; z-index: 5; }
        .admin-section { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        input, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: var(--mono); font-size: 13px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-family: var(--mono); text-transform: uppercase; font-size: 10px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:hover { background: var(--accent-dim); box-shadow: 0 0 15px var(--accent); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; position: relative; z-index: 2; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #000; margin-bottom: 20px; border: 1px solid var(--border); filter: grayscale(1); transition: 0.3s; }
        .card:hover .card-img { filter: none; }

        #detail-modal { position: fixed; inset: 0; background: rgba(3,5,8,0.98); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .modal-content { background: var(--surface); border: 1px solid var(--accent); max-width: 900px; width: 100%; padding: 40px; position: relative; }
        
        .admin-actions { display: none; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .edit-mode .admin-actions { display: flex; }
        .login-trigger { position: fixed; bottom: 20px; right: 20px; opacity: 0.05; cursor: pointer; font-size: 10px; z-index: 10; }
    </style></head><body>

<div id="detail-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="tagline" id="modal-cat"></div>
        <h2 id="modal-title" style="margin: 10px 0; text-transform: uppercase; font-size: clamp(24px, 5vw, 42px);"></h2>
        <div id="modal-gallery" style="display:flex; flex-direction:column; gap:20px; margin:20px 0;"></div>
        <div id="modal-body" style="font-family: var(--mono); color: #a1aab8; white-space: pre-wrap; font-size: 14px; line-height: 1.8;"></div>
        <div id="modal-links" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:25px; border-top:1px solid var(--border); padding-top:20px;"></div>
        <button class="btn" style="margin-top:40px; border-color:var(--muted); color:var(--muted)" onclick="closeModal()">Close_Terminal</button>
    </div>
</div>

<div class="container">
    <header>
        <div class="tagline">ARCHIVE_SYSTEM_v17.1 // CORE_RESTORE</div>
        <h1>John Hall</h1>
        <p style="font-family: var(--mono); color: var(--muted);">SR_ANALYST // AI_ML_ARCHITECTURE</p>
    </header>

    <div class="nav-zone">
        <div class="filter-list" id="filter-bar"></div>
        <div class="sub-nav" id="sub-filter-bar"></div>
    </div>

    <div id="admin-panel" class="admin-bar">
        <div class="admin-section">
            <div class="tagline" style="margin-bottom:10px;">Structure_Manager</div>
            <div id="cat-chips" style="margin-bottom:15px; display:flex; flex-wrap:wrap; gap:5px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-cat" placeholder="E.G. CAREER:ANALYTICS" style="margin:0;">
                <button class="btn" onclick="addStructure()">Add_Node</button>
            </div>
        </div>
        <div class="admin-section">
            <div class="tagline" style="margin-bottom:10px;">Entry_Editor</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <input type="text" id="p-title" placeholder="PROJECT_NAME">
                <input type="text" id="p-category" placeholder="DOMAIN (PARENT:CHILD)">
            </div>
            <input type="text" id="p-img" placeholder="IMAGE_URLS (Comma separated)">
            <input type="text" id="p-links" placeholder="LABEL:URL, LABEL:URL">
            <textarea id="p-desc" rows="2" placeholder="SHORT_SUMMARY"></textarea>
            <textarea id="p-detail" rows="4" placeholder="FULL_LOG (HTML OK)"></textarea>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn" onclick="saveProject()" id="save-btn">Sync_Entry</button>
                <button class="btn" onclick="exportFinalHTML()">Download_V17.1</button>
                <button class="btn btn-danger" onclick="cancelEdit()" id="cancel-btn" style="display:none">Abort</button>
                <button class="btn btn-danger" onclick="lockAdmin()" style="margin-left:auto;">Lock_Terminal</button>
            </div>
        </div>
    </div>

    <div class="grid" id="project-grid"></div>
</div>

<div class="login-trigger" onclick="unlockAdmin()">[SYSTEM_KEY]</div>

<script>
    // DATA CORE - RECOVERED
    let projects = [
        {"id":1,"title":"ELEVATED CANDLES","category":"CAREER:OPERATIONS","desc":"Founder & Data Lead.","detail":"<b>Technical Breakdown:</b>\nSQL Server optimization and KPI dashboards.","img":"fall fantasy.png","links":"Instagram: https://www.instagram.com/elevatedcandles/"},
        {"id":2,"title":"THE Y FILES","category":"CREATIVE:DOCUMENTARY","desc":"A documentary exploration of data and storytelling.","detail":"Log entries covering various episodes and data narratives.","img":"y_files - logo.png","links":"EP1: https://www.facebook.com/share/v/1CMZ5irfWt/, EP2: https://www.facebook.com/share/v/1DrBcmPFzN/"}
    ];
    let structure = ["CAREER:ANALYTICS", "CAREER:CODE", "CREATIVE:VIDEO", "RESEARCH"];
    
    let currentParent = 'ALL';
    let currentChild = 'ALL';
    let editingId = null;

    function render() {
        // Find all unique parents
        const parents = ['ALL', ...new Set([
            ...structure.map(s => s.split(':')[0]), 
            ...projects.map(p => p.category.split(':')[0])
        ])].filter(Boolean);
        
        // Render Parent Nav
        document.getElementById('filter-bar').innerHTML = parents.map(p => 
            `<button class="filter-btn ${currentParent === p ? 'active' : ''}" onclick="setParent('${p}')">${p}</button>`
        ).join('');

        // Render Sub Nav logic
        const subNav = document.getElementById('sub-filter-bar');
        if (currentParent !== 'ALL') {
            const children = ['ALL', ...new Set([
                ...structure.filter(s => s.startsWith(currentParent + ':')).map(s => s.split(':')[1]),
                ...projects.filter(p => p.category.startsWith(currentParent + ':')).map(p => p.category.split(':')[1])
            ].filter(Boolean))];
            
            if (children.length > 1) {
                subNav.style.display = 'flex';
                subNav.innerHTML = children.map(c => 
                    `<button class="sub-btn ${currentChild === c ? 'active' : ''}" onclick="setChild('${c}')">[ ${c} ]</button>`
                ).join('');
            } else { subNav.style.display = 'none'; }
        } else { subNav.style.display = 'none'; }

        // Render Admin Chips
        document.getElementById('cat-chips').innerHTML = structure.map(s => 
            `<span style="background:#000; border:1px solid var(--border); padding:4px 8px; font-size:10px; font-family:var(--mono);">${s} <button onclick="removeStructure('${s}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">×</button></span>`
        ).join('');

        // Filter and Render Grid
        const filtered = projects.filter(p => {
            const [pCat, pSub] = p.category.split(':');
            const matchParent = currentParent === 'ALL' || pCat === currentParent;
            const matchChild = currentChild === 'ALL' || pSub === currentChild;
            return matchParent && matchChild;
        });

        document.getElementById('project-grid').innerHTML = filtered.map(p => `
            <div class="card">
                ${p.img ? `<img src="${p.img.split(',')[0]}" class="card-img">` : ''}
                <div class="tagline" style="font-size:10px; color:var(--accent); margin-bottom:5px;">// ${p.category.replace(':', ' > ')}</div>
                <div class="card-title">${p.title}</div>
                <p style="font-family:var(--mono); color:var(--muted); font-size:12px; flex-grow:1;">${p.desc}</p>
                <button class="btn" style="margin-top:15px;" onclick="openModal(${p.id})">Open_Log <i data-lucide="chevron-right"></i></button>
                <div class="admin-actions">
                    <button class="btn btn-danger" onclick="deleteProject(${p.id})">Del</button>
                    <button class="btn" onclick="startEdit(${p.id})">Edit</button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function setParent(p) { currentParent = p; currentChild = 'ALL'; render(); }
    function setChild(c) { currentChild = c; render(); }

    function addStructure() {
        const val = document.getElementById('new-cat').value.toUpperCase().trim();
        if(val && !structure.includes(val)) { structure.push(val); document.getElementById('new-cat').value=''; render(); }
    }
    function removeStructure(s) { if(confirm("Remove Node?")) { structure = structure.filter(i => i !== s); render(); } }

    function openModal(id) {
        const p = projects.find(x => x.id === id);
        document.getElementById('modal-title').innerText = p.title;
        document.getElementById('modal-cat').innerText = `DATA_ENTRY // ${p.category}`;
        document.getElementById('modal-body').innerHTML = p.detail || p.desc;
        document.getElementById('modal-gallery').innerHTML = p.img ? p.img.split(',').map(src => `<img src="${src.trim()}" style="width:100%; border:1px solid var(--border);">`).join('') : '';
        document.getElementById('modal-links').innerHTML = p.links ? p.links.split(',').map(l => {
            const parts = l.split(':');
            const label = parts.shift().trim();
            const url = parts.join(':').trim();
            return `<a href="${url}" target="_blank" class="btn">${label}</a>`;
        }).join('') : '';
        document.getElementById('detail-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        lucide.createIcons();
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

    function saveProject() {
        const p = {
            id: editingId || Date.now(),
            title: document.getElementById('p-title').value,
            category: document.getElementById('p-category').value.toUpperCase().trim(),
            desc: document.getElementById('p-desc').value,
            detail: document.getElementById('p-detail').value,
            img: document.getElementById('p-img').value,
            links: document.getElementById('p-links').value
        };
        if(editingId) projects = projects.map(x => x.id === editingId ? p : x);
        else projects.push(p);
        cancelEdit(); render();
    }

    function startEdit(id) {
        editingId = id; const p = projects.find(x => x.id === id);
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-category').value = p.category;
        document.getElementById('p-desc').value = p.desc;
        document.getElementById('p-detail').value = p.detail || '';
        document.getElementById('p-img').value = p.img || '';
        document.getElementById('p-links').value = p.links || '';
        document.getElementById('save-btn').innerText = "Update_Entry";
        document.getElementById('cancel-btn').style.display = "inline-flex";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit() {
        editingId = null;
        ['p-title','p-category','p-desc','p-detail','p-img','p-links'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('save-btn').innerText = "Sync_Entry";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteProject(id) { if(confirm("WIPE ENTRY?")) { projects = projects.filter(p => p.id !== id); render(); } }

    function unlockAdmin() { if(prompt("PASSCODE:") === "5236") { document.body.classList.add('edit-mode'); document.getElementById('admin-panel').style.display='block'; } }
    function lockAdmin() { document.getElementById('admin-panel').style.display='none'; document.body.classList.remove('edit-mode'); }

    function exportFinalHTML() {
        const projData = `let projects = ${JSON.stringify(projects)};`;
        const structData = `let structure = ${JSON.stringify(structure)};`;
        let html = document.documentElement.outerHTML;
        html = html.replace(/let projects = \[.*?\];/s, projData);
        html = html.replace(/let structure = \[.*?\];/s, structData);
        html = html.replace('display: block;', 'display: none;'); 
        html = html.replace('class="edit-mode"', '');
        const blob = new Blob(["<!DOCTYPE html>\n" + html], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }

    render();
</script></body></html>
